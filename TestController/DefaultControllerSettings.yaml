# 控制器默认设置：尽量保留旧平台“控制器 + 目标机 Toolkit + 结果回收”的模型。
controller:
  version_file: TestController/References/Version.txt
  results_dir: Results
  default_python: python3
  stop_on_fail: true
  sync_toolkit: true
  sync_toolkit_user: true
  sync_toolkit_settings: true

remote:
  root_dir: ~/sit-auto
  toolkit_dir: ~/sit-auto/Toolkit
  toolkit_user_dir: ~/sit-auto/ToolkitUserFiles
  toolkit_settings_dir: ~/sit-auto/ToolkitSettings
  results_dir: ~/sit-auto/Results
  python: python3
